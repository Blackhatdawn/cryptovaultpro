# Render.com Deployment Configuration
# CryptoVault Backend - Production Ready
# Last Updated: 2026-02-09

services:
  # Backend API Service
  - type: web
    name: cryptovault-backend
    runtime: python
    # Runtime is pinned via backend/.python-version (3.11.11).
    # In Render Dashboard: Settings -> Environment -> Python Version should also be set to 3.11.
    plan: standard  # ⚠️ CRITICAL: Production requires 'standard' plan to avoid cold starts (eliminates 15-min spindown)
    region: oregon  # Choose closest to your users: oregon, frankfurt, singapore
    maxInstanceCount: 2  # Enable auto-scaling up to 2 instances under load
    rootDir: backend
    buildCommand: |
      pip install --upgrade pip &&
      pip install -r requirements.txt &&
      python -m compileall -q .
    startCommand: python start_server.py
    
    envVars:
      # ============================================
      # APPLICATION SETTINGS
      # ============================================
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: FULL_PRODUCTION_CONFIGURATION
        value: "true"
      - key: LOG_LEVEL
        value: INFO
      - key: APP_NAME
        value: "CryptoVault Pro"
      - key: APP_VERSION
        value: "2.0.0"
      - key: WORKERS
        value: "4"
      - key: HOST
        value: 0.0.0.0
      - key: UVICORN_LOOP
        value: asyncio
      - key: UVICORN_TIMEOUT_KEEP_ALIVE
        value: "5"
      - key: UVICORN_LIMIT_MAX_REQUESTS
        value: "10000"
      - key: LOG_FORMAT
        value: json
      - key: API_WARMUP_TIMEOUT_MS
        value: "5000"
      # Keep PYTHON_VERSION for compatibility; runtime pin is enforced via backend/.python-version and Render runtime setting.
      - key: PYTHON_VERSION
        value: 3.11.11
      
      # ============================================
      # DATABASE (MongoDB Atlas)
      # ============================================
      - key: MONGO_URL
        sync: false  # Set as secret in Render dashboard
      - key: DB_NAME
        value: cryptovault
      - key: MONGO_MAX_POOL_SIZE
        value: "50"
      - key: MONGO_TIMEOUT_MS
        value: "5000"
      
      # ============================================
      # AUTHENTICATION (JWT)
      # ============================================
      - key: JWT_SECRET
        sync: false  # Set as secret
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: CSRF_SECRET
        sync: false  # Set as secret
      
      # ============================================
      # CORS & COOKIES
      # ============================================
      - key: CORS_ORIGINS
        value: '["https://www.cryptovaultpro.finance","https://cryptovaultpro.finance","https://coinbase-love.vercel.app"]'
      - key: USE_CROSS_SITE_COOKIES
        value: "true"
      - key: COOKIE_SAMESITE
        value: lax
      - key: COOKIE_SECURE
        value: "true"
      
      # ============================================
      # PUBLIC URLs
      # ============================================
      - key: APP_URL
        value: https://www.cryptovaultpro.finance
      - key: PUBLIC_API_URL
        value: https://cryptovault-api.onrender.com
      - key: PUBLIC_WS_URL
        value: wss://cryptovault-api.onrender.com
      - key: PUBLIC_SOCKET_IO_PATH
        value: /socket.io/
      - key: EMAIL_VERIFICATION_URL
        value: https://cryptovaultpro.finance/verify
      
      # ============================================
      # RATE LIMITING
      # ============================================
      - key: RATE_LIMIT_ENABLED
        value: "true"
      - key: RATE_LIMIT_DEFAULT
        value: "100 per minute"
      - key: RATE_LIMIT_PER_MINUTE
        value: "60"
      - key: COINCAP_RATE_LIMIT
        value: "200"
      
      # ============================================
      # EMAIL (SMTP)
      # ============================================
      - key: EMAIL_SERVICE
        value: smtp
      - key: EMAIL_FROM
        value: securedvault@cryptovaultpro.finance
      - key: EMAIL_FROM_NAME
        value: "CryptoVault Pro"
      - key: SMTP_HOST
        value: mail.spacemail.com
      - key: SMTP_PORT
        value: "465"
      - key: SMTP_USERNAME
        value: support@cryptovaultpro.finance
      - key: SMTP_USE_SSL
        value: "true"
      - key: SMTP_USE_TLS
        value: "false"
      - key: SMTP_PASSWORD
        sync: false  # Set as secret
      - key: SENDGRID_API_KEY
        sync: false  # Set as secret (fallback)
      - key: RESEND_API_KEY
        sync: false  # Set as secret (fallback)
      
      # ============================================
      # TELEGRAM NOTIFICATIONS
      # ============================================
      - key: TELEGRAM_ENABLED
        value: "true"
      - key: TELEGRAM_BOT_TOKEN
        sync: false  # Set as secret
      - key: ADMIN_TELEGRAM_CHAT_ID
        sync: false  # Set as secret (comma-separated IDs)
      
      # ============================================
      # EXTERNAL APIs
      # ============================================
      - key: COINCAP_API_KEY
        sync: false  # Set as secret
      - key: COINMARKETCAP_API_KEY
        sync: false  # Set as secret (fallback price provider)
      
      # ============================================
      # PAYMENTS (NOWPayments)
      # ============================================
      - key: NOWPAYMENTS_API_KEY
        sync: false  # Set as secret
      - key: NOWPAYMENTS_IPN_SECRET
        sync: false  # Set as secret
      - key: NOWPAYMENTS_SANDBOX
        value: "false"
      - key: ALLOW_MOCK_PAYMENT_FALLBACK
        value: "false"
      
      # ============================================
      # CACHE (Redis) - Currently Disabled
      # ============================================
      - key: USE_REDIS
        value: "false"
      - key: REDIS_PREFIX
        value: "cryptovault:prod:"
      - key: UPSTASH_REDIS_REST_URL
        sync: false  # Set as secret (if enabled)
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false  # Set as secret (if enabled)
      
      # ============================================
      # FILE STORAGE (S3)
      # ============================================
      - key: S3_ENDPOINT_URL
        value: https://s3-nl.hostkey.com
      - key: S3_REGION
        value: nl
      - key: S3_BUCKET_KYC
        value: b5ee6f018-cryptovault-kyc-documents
      - key: S3_BUCKET_AUDIT
        value: b9a9b37c-cryptovault-audit-logs
      - key: S3_ACCESS_KEY_ID
        sync: false  # Set as secret
      - key: S3_SECRET_ACCESS_KEY
        sync: false  # Set as secret
      
      # ============================================
      # FIREBASE
      # ============================================
      - key: FIREBASE_CREDENTIALS_PATH
        value: /app/backend/firebase-credentials.json
      
      # ============================================
      # MONITORING (Sentry)
      # ============================================
      - key: SENTRY_DSN
        sync: false  # Set as secret
      - key: SENTRY_TRACES_SAMPLE_RATE
        value: "0.1"
      - key: SENTRY_PROFILES_SAMPLE_RATE
        value: "0.1"
      - key: PUBLIC_SENTRY_DSN
        value: "your-frontend-sentry-dsn-if-you-want-it"
      
      # ============================================
      # FEATURE FLAGS
      # ============================================
      - key: USE_MOCK_PRICES
        value: "false"
      - key: FEATURE_2FA_ENABLED
        value: "true"
      - key: FEATURE_DEPOSITS_ENABLED
        value: "true"
      - key: FEATURE_STAKING_ENABLED
        value: "false"
      - key: FEATURE_TRADING_ENABLED
        value: "true"
      - key: FEATURE_WITHDRAWALS_ENABLED
        value: "true"
      - key: FEATURE_TRANSFERS_ENABLED
        value: "true"
      
      # ============================================
      # PUBLIC CONFIG (exposed to frontend)
      # ============================================
      - key: PUBLIC_LOGO_URL
        value: https://www.cryptovaultpro.finance/logo.svg
      - key: PUBLIC_SITE_NAME
        value: "CryptoVault Pro"
      - key: PUBLIC_SUPPORT_EMAIL
        value: support@cryptovaultpro.finance
    
    # Health check endpoint
    healthCheckPath: /api/health
    
    # Auto-deploy on push to main branch
    autoDeploy: true
    
    # Disk storage (optional, for logs/temp files)
    disk:
      name: cryptovault-disk
      mountPath: /app/data
      sizeGB: 1

